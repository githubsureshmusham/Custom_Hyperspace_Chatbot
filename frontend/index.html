<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova AI · Custom Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" id="newChatBtn">
          <span class="icon">＋</span> New chat
        </button>
      </div>
      <div class="chat-list" id="chatList"></div>
      <div class="sidebar-footer">
        <div class="footer-item" id="clearAllBtn">🗑️ Clear all chats</div>
        <div class="footer-brand">Powered by LiteLLM · Hyperspace</div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <button class="hamburger" id="hamburger">☰</button>
        <div class="brand">
          <span class="logo">✦</span> Nova AI
        </div>
        <div class="topbar-controls">
          <select id="modelSelect" class="model-select" title="Model"></select>
          <button class="settings-btn" id="refreshModelsBtn" title="Refresh model list">⟳</button>
          <button class="settings-btn" id="settingsBtn" title="Settings">⚙️</button>
        </div>
      </header>

      <section class="messages" id="messages">
        <div class="welcome" id="welcome">
          <div class="welcome-logo">✦</div>
          <h1>How can I help you today?</h1>
          <p>Ask me anything — powered by your LiteLLM Hyperspace proxy.</p>
          <div class="suggestions">
            <button class="suggestion">Explain quantum computing simply</button>
            <button class="suggestion">Write a Python script to rename files</button>
            <button class="suggestion">Give me ideas for a weekend project</button>
            <button class="suggestion">Summarize the theory of relativity</button>
          </div>
        </div>
      </section>

      <footer class="composer">
        <div class="composer-inner">
          <textarea id="input" class="input" placeholder="Message Nova AI…" rows="1"></textarea>
          <button id="sendBtn" class="send-btn" title="Send">➤</button>
          <button id="stopBtn" class="stop-btn hidden" title="Stop">■</button>
        </div>
        <div class="disclaimer">Nova AI can make mistakes. Verify important information.</div>
      </footer>
    </main>
  </div>

  <!-- Settings modal -->
  <div class="modal-overlay hidden" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Settings</h3>
        <button class="close-btn" id="closeSettings">✕</button>
      </div>
      <div class="modal-body">
        <label class="field">
          <span>System prompt</span>
          <textarea id="systemPrompt" rows="4" placeholder="You are a helpful assistant…"></textarea>
        </label>
        <label class="field">
          <span>
            <input type="checkbox" id="tempEnabled" style="width:auto;vertical-align:middle;margin-right:6px;" />
            Set temperature: <b id="tempValue">model default</b>
          </span>
          <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7" disabled />
          <small style="color:#9a9db0;">Leave unchecked to use each model's default (some models reject a custom temperature).</small>
        </label>
        <label class="field">
          <span>Max tokens (blank = model default)</span>
          <input type="number" id="maxTokens" min="1" placeholder="e.g. 1024" />
        </label>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" id="saveSettings">Save</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
